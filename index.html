<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Аленький цветочек</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Сцена 1: Закрытый цветок -->
    <div id="scene1" class="scene active">
        <img id="closedflower" src="./closedflower.png" alt="Закрытый цветок">
        <h1 id="title1">предсказания аленького цветочка</h1>
        <h1 id="title2">нажмите, чтобы получить предсказание</h1>
    </div>
    
    <!-- Сцена 2: Открытый цветок и предсказание -->
    <div id="scene2" class="scene">
        <p id="bluehour">blue hour by tomorrow x together</p>
        <img id="openflower" src="./openflower.png" alt="Распустившийся цветок">
        
        <!-- Контейнер для текста предсказания (ВАЖНО: добавлено сюда) -->
        <div id="prediction-container">
            <p id="prediction"></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
